services:
  postgres:
    image: postgres:16
    container_name: dmb_postgres
    restart: always
    environment:
      POSTGRES_DB: dmb
      POSTGRES_USER: dmb_user
      POSTGRES_PASSWORD: dmb_password
    ports:
      - "5432:5432"
    volumes:
      - dmb_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dmb_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  dmb_postgres_data: